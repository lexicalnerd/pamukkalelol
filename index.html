<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pamukkale.lol</title>
    <meta name="description" content="Playful rainbow parallax text for pamukkale.lol with swappable themes and touch-friendly motion." />
    <meta name="theme-color" content="#120224" />
    <meta property="og:title" content="pamukkale.lol" />
    <meta property="og:description" content="Playful rainbow parallax text with theme switching and touch interaction." />
    <meta property="og:type" content="website" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23120224'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-size='34' font-family='Comic Sans MS, Comic Sans, cursive'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E"
    />
    <style>
      :root {
        --bg-top: #040412;
        --bg-bottom: #120224;
        --glow: rgba(255, 255, 255, 0.28);
        --shadow: rgba(0, 0, 0, 0.45);
        --pointer-x: 50%;
        --pointer-y: 50%;
        --rotate-x: -8deg;
        --rotate-y: 10deg;
        --shift-x: 0px;
        --shift-y: 0px;
        --glow-x: 0px;
        --glow-y: 0px;
        --bg-shift-x: 50%;
        --bg-shift-y: 50%;
        --fit-scale: 1;
        --stack-max-width: 100%;
        --display-font: "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Marker Felt", cursive;
        --texture-opacity: 0.24;
        --haze-shift: 0px;
        --snow-opacity: 1;
        --text-gradient: linear-gradient(
          90deg,
          #ff1744 0%,
          #ff9100 16%,
          #ffea00 32%,
          #1de9b6 50%,
          #00b0ff 68%,
          #7c4dff 84%,
          #ff4081 100%
        );
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        display: grid;
        place-items: center;
        padding:
          max(1rem, env(safe-area-inset-top))
          max(1rem, env(safe-area-inset-right))
          max(1rem, env(safe-area-inset-bottom))
          max(1rem, env(safe-area-inset-left));
        font-family: "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Marker Felt", cursive;
        background:
          radial-gradient(circle at var(--bg-shift-x) var(--bg-shift-y), rgba(255, 255, 255, 0.12), transparent 14%),
          radial-gradient(circle at top, rgba(255, 255, 255, 0.15), transparent 30%),
          radial-gradient(circle at 20% 20%, rgba(255, 0, 140, 0.16), transparent 24%),
          radial-gradient(circle at 80% 30%, rgba(0, 208, 255, 0.2), transparent 26%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        color: white;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        background:
          radial-gradient(circle at 18% 78%, rgba(255, 255, 255, 0.08), transparent 0 16%),
          radial-gradient(circle at 28% 74%, rgba(255, 255, 255, 0.05), transparent 0 11%),
          radial-gradient(circle at 42% 80%, rgba(255, 255, 255, 0.06), transparent 0 14%),
          radial-gradient(circle at 58% 77%, rgba(255, 255, 255, 0.05), transparent 0 12%),
          radial-gradient(circle at 74% 81%, rgba(255, 255, 255, 0.07), transparent 0 15%);
        opacity: var(--texture-opacity);
        mix-blend-mode: screen;
      }

      body::after {
        background:
          radial-gradient(circle at 50% 55%, rgba(255, 255, 255, 0.08), transparent 0 18%),
          radial-gradient(circle at 22% 30%, rgba(255, 132, 196, 0.12), transparent 0 24%),
          radial-gradient(circle at 78% 32%, rgba(88, 191, 255, 0.12), transparent 0 28%);
        transform: translateY(var(--haze-shift));
        opacity: 0.75;
      }

      .snowfield {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 1;
        opacity: var(--snow-opacity);
      }

      .flake {
        position: absolute;
        top: -10vh;
        left: var(--flake-left);
        font-size: var(--flake-size);
        opacity: 0.72;
        animation: snowfall var(--flake-duration) linear infinite;
        animation-delay: var(--flake-delay);
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.22));
      }

      @keyframes snowfall {
        from {
          transform: translate3d(0, 0, 0) rotate(0deg);
        }
        to {
          transform: translate3d(var(--flake-drift), 120vh, 0) rotate(180deg);
        }
      }

      .scene {
        width: min(100%, 1100px);
        height: min(70vh, 560px);
        position: relative;
        display: grid;
        place-items: center;
        perspective: 1600px;
        touch-action: none;
      }

      .controls-panel {
        position: fixed;
        top: 1rem;
        left: 1rem;
        z-index: 10;
        width: min(92vw, 360px);
      }

      .controls-panel details {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 22px;
        background: rgba(9, 8, 24, 0.56);
        backdrop-filter: blur(10px);
        overflow: clip;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
        transition:
          border-color 240ms ease,
          background 240ms ease,
          box-shadow 280ms ease,
          transform 280ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .controls-panel details[open] {
        border-color: rgba(255, 255, 255, 0.26);
        background: rgba(17, 14, 36, 0.74);
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.24);
        transform: translateY(-2px);
      }

      .controls-panel summary {
        list-style: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.88rem 1rem;
        font: 700 0.86rem/1 "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Marker Felt", cursive;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.9);
      }

      .controls-panel summary::-webkit-details-marker {
        display: none;
      }

      .controls-panel summary::after {
        content: "";
        width: 0.78rem;
        height: 0.78rem;
        flex: 0 0 0.78rem;
        border-right: 2px solid rgba(255, 255, 255, 0.82);
        border-bottom: 2px solid rgba(255, 255, 255, 0.82);
        transform: rotate(45deg) translateY(-2px);
        transition: transform 280ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .controls-panel details[open] summary::after {
        transform: rotate(225deg) translateY(1px);
      }

      .controls-body {
        max-height: 0;
        opacity: 0;
        transform: translateY(-10px);
        padding: 0 1rem 1rem;
        overflow-y: auto;
        overscroll-behavior: contain;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.28) transparent;
        transition:
          max-height 320ms cubic-bezier(0.22, 1, 0.36, 1),
          opacity 220ms ease,
          transform 320ms cubic-bezier(0.22, 1, 0.36, 1),
          padding-top 320ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .controls-panel details[open] .controls-body {
        max-height: min(540px, calc(100vh - 7rem));
        opacity: 1;
        transform: translateY(0);
        padding-top: 0.2rem;
        box-shadow:
          inset 0 12px 12px -14px rgba(255, 255, 255, 0.12),
          inset 0 -18px 18px -20px rgba(255, 255, 255, 0.16);
      }

      .controls-body::-webkit-scrollbar {
        width: 10px;
      }

      .controls-body::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.24);
        border-radius: 999px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }

      .controls-hint {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.45rem;
        margin: 0 0 0.85rem;
        font: 700 0.66rem/1 "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Marker Felt", cursive;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: center;
        color: rgba(255, 255, 255, 0.54);
      }

      .controls-hint::before,
      .controls-hint::after {
        content: "";
        width: 0.5rem;
        height: 0.5rem;
        border-right: 2px solid rgba(255, 255, 255, 0.34);
        border-bottom: 2px solid rgba(255, 255, 255, 0.34);
        transform: rotate(45deg);
      }

      .control-section + .control-section {
        margin-top: 0.95rem;
      }

      .section-label {
        margin: 0 0 0.55rem;
        font: 700 0.72rem/1 "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Marker Felt", cursive;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.72);
      }

      .text-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 0.5rem;
      }

      .toggle-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.5rem;
      }

      .text-input,
      .action-button,
      .font-button,
      .toggle-button {
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px);
      }

      .text-input {
        width: 100%;
        border-radius: 14px;
        padding: 0.82rem 0.95rem;
        font: 700 0.95rem/1 "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Marker Felt", cursive;
      }

      .text-input::placeholder {
        color: rgba(255, 255, 255, 0.46);
      }

      .action-button,
      .font-button,
      .toggle-button {
        appearance: none;
        border-radius: 14px;
        padding: 0.8rem 0.95rem;
        font: 700 0.76rem/1 var(--display-font);
        letter-spacing: 0.05em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .font-button.is-active {
        border-color: rgba(255, 255, 255, 0.56);
        background: rgba(255, 255, 255, 0.14);
        color: rgba(255, 255, 255, 0.98);
      }

      .toggle-button.is-active {
        border-color: rgba(255, 255, 255, 0.56);
        background: rgba(255, 255, 255, 0.14);
        color: rgba(255, 255, 255, 0.98);
      }

      .font-grid,
      .theme-grid,
      .snow-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.65rem;
      }

      .font-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .snow-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .theme-button {
        appearance: none;
        border: 2px solid rgba(255, 255, 255, 0.2);
        background: transparent;
        border-radius: 16px;
        padding: 0;
        aspect-ratio: 1 / 1;
        min-height: 2.8rem;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: transform 260ms cubic-bezier(0.22, 1, 0.36, 1), border-color 260ms ease;
      }

      .snow-button {
        appearance: none;
        border: 2px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.95);
        border-radius: 16px;
        min-height: 2.8rem;
        padding: 0;
        font-size: 1.25rem;
        cursor: pointer;
        transition: transform 260ms cubic-bezier(0.22, 1, 0.36, 1), border-color 260ms ease, background 260ms ease;
      }

      .theme-button:hover,
      .theme-button:focus-visible,
      .snow-button:hover,
      .snow-button:focus-visible {
        transform: translateY(-2px) scale(1.03);
        border-color: rgba(255, 255, 255, 0.52);
        outline: none;
      }

      .theme-button.is-active {
        border-color: rgba(255, 255, 255, 0.7);
      }

      .snow-button.is-active {
        border-color: rgba(255, 255, 255, 0.56);
        background: rgba(255, 255, 255, 0.14);
      }

      .theme-button::before {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--swatch, var(--text-gradient));
        filter: saturate(0.9) brightness(0.96);
      }

      .theme-button::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        height: 36%;
        background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.18));
      }

      .theme-button[data-theme="party"]::before {
        filter: saturate(1.15) brightness(1.05);
      }

      .theme-button[data-theme="chaos"]::before {
        filter: saturate(1.2) brightness(1.02);
      }

      .scene::before,
      .scene::after {
        content: "";
        position: absolute;
        inset: 8%;
        border-radius: 50%;
        filter: blur(36px);
        pointer-events: none;
      }

      .scene::before {
        background: conic-gradient(
          from 90deg,
          #ff004c,
          #ff7a00,
          #ffd500,
          #39ff14,
          #00d4ff,
          #2b65ff,
          #9d4dff,
          #ff004c
        );
        opacity: 0.18;
      }

      .scene::after {
        inset: 24%;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.16), transparent 58%);
      }

      .stack {
        position: relative;
        display: grid;
        place-items: center;
        width: max-content;
        max-width: var(--stack-max-width);
        padding: 0.18em 0.2em 0.24em;
        transform-style: preserve-3d;
        transform:
          rotateX(var(--rotate-x))
          rotateY(var(--rotate-y))
          translateX(var(--shift-x))
          translateY(var(--shift-y))
          scale(var(--fit-scale));
        transform-origin: center center;
        transition: transform 320ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .sizer {
        font-size: clamp(2.8rem, 11vw, 8.8rem);
        font-weight: 900;
        font-family: var(--display-font);
        letter-spacing: 0.015em;
        text-transform: lowercase;
        white-space: nowrap;
        visibility: hidden;
      }

      .mobile-break {
        display: none;
      }

      .forced-break {
        display: block;
      }

      .stack.has-forced-break {
        width: min(100%, 56rem);
      }

      .stack.has-forced-break .sizer,
      .stack.has-forced-break .layer,
      .stack.has-forced-break .layer span {
        white-space: normal;
        text-align: center;
        line-height: 0.9;
      }

      .layer {
        position: absolute;
        inset: 0 auto auto 0;
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        font-size: clamp(2.8rem, 11vw, 8.8rem);
        font-weight: 900;
        font-family: var(--display-font);
        letter-spacing: 0.015em;
        text-transform: lowercase;
        white-space: nowrap;
        user-select: none;
        pointer-events: none;
      }

      .layer span {
        display: inline-block;
        padding: 0.06em 0.1em 0.14em;
        transform-style: preserve-3d;
        transition:
          transform 320ms cubic-bezier(0.22, 1, 0.36, 1),
          filter 320ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .layer.depth-6 span {
        color: rgba(16, 0, 28, 0.95);
        text-shadow: 0 12px 22px var(--shadow);
        transform: translate3d(calc(var(--shift-x) * -1.4), calc(var(--shift-y) * -1.4), -180px);
      }

      .layer.depth-5 span {
        color: rgba(44, 0, 72, 0.9);
        transform: translate3d(calc(var(--shift-x) * -1.15), calc(var(--shift-y) * -1.15), -140px);
      }

      .layer.depth-4 span {
        color: rgba(84, 20, 116, 0.85);
        transform: translate3d(calc(var(--shift-x) * -0.9), calc(var(--shift-y) * -0.9), -100px);
      }

      .layer.depth-3 span {
        color: rgba(154, 54, 194, 0.84);
        transform: translate3d(calc(var(--shift-x) * -0.65), calc(var(--shift-y) * -0.65), -60px);
      }

      .layer.depth-2 span {
        color: rgba(255, 255, 255, 0.35);
        -webkit-text-stroke: 2px rgba(255, 255, 255, 0.15);
        transform: translate3d(calc(var(--shift-x) * -0.35), calc(var(--shift-y) * -0.35), -20px);
      }

      .layer.depth-1 span {
        background: var(--text-gradient);
        background-size: 160% 160%;
        color: transparent;
        background-clip: text;
        -webkit-background-clip: text;
        filter: drop-shadow(0 0 18px rgba(255, 255, 255, 0.32));
        transform: translate3d(calc(var(--shift-x) * 0.18), calc(var(--shift-y) * 0.18), 24px);
      }

      .layer.gloss span {
        color: transparent;
        -webkit-text-stroke: 1px rgba(255, 255, 255, 0.45);
        text-shadow:
          0 0 16px rgba(255, 255, 255, 0.18),
          calc(var(--shift-x) * 0.2) calc(var(--shift-y) * 0.2) 18px rgba(255, 255, 255, 0.14);
        transform: translate3d(calc(var(--shift-x) * 0.3), calc(var(--shift-y) * 0.3), 58px);
      }

      @media (max-width: 720px) {
        body {
          padding:
            max(0.75rem, env(safe-area-inset-top))
            max(0.75rem, env(safe-area-inset-right))
            max(1rem, env(safe-area-inset-bottom))
            max(0.75rem, env(safe-area-inset-left));
        }

        .controls-panel {
          position: fixed;
          top: max(0.75rem, env(safe-area-inset-top));
          bottom: auto;
          left: 50%;
          width: min(calc(100vw - 1.5rem), 360px);
          transform: translateX(-50%);
        }

        .controls-panel details {
          border-radius: 18px;
        }

        .controls-panel summary {
          padding: 0.82rem 0.95rem;
          font-size: 0.78rem;
        }

        .controls-body {
          padding-left: 0.85rem;
          padding-right: 0.85rem;
          padding-bottom: 0.85rem;
        }

        .theme-grid {
          grid-template-columns: repeat(6, minmax(0, 1fr));
          gap: 0.45rem;
        }

        .snow-grid {
          grid-template-columns: repeat(5, minmax(0, 1fr));
          gap: 0.45rem;
        }

        .controls-panel details[open] .controls-body {
          max-height: min(62vh, 460px);
        }

        .scene {
          width: 100%;
          height: min(72dvh, 560px);
          padding-top: 4.5rem;
          padding-bottom: 1.1rem;
          overflow: visible;
        }

        .stack {
          width: 100%;
          max-width: min(100%, 21.5rem);
          padding-left: 0;
          padding-right: 0;
        }

        .sizer,
        .layer {
          font-size: clamp(2.35rem, 14.8vw, 5.3rem);
        }

        .sizer,
        .layer,
        .layer span {
          white-space: normal;
          text-align: center;
          line-height: 0.88;
        }

        .mobile-break {
          display: block;
        }

        .layer span {
          padding: 0.04em 0.08em 0.12em;
        }
      }

      @media (max-width: 480px) {
        .scene {
          height: min(74dvh, 560px);
          padding-top: 4.25rem;
          padding-bottom: 1rem;
        }

        .stack {
          max-width: min(100%, 18.25rem);
        }

        .sizer,
        .layer {
          font-size: clamp(2.08rem, 13.4vw, 4.25rem);
          letter-spacing: 0;
        }

        .sizer,
        .layer,
        .layer span {
          line-height: 0.86;
        }

        .theme-grid {
          grid-template-columns: repeat(6, minmax(0, 1fr));
        }

        .text-row {
          grid-template-columns: 1fr;
        }

        .font-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .snow-grid {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }

        .toggle-row {
          grid-template-columns: 1fr;
        }

        .controls-hint {
          font-size: 0.64rem;
        }

        .theme-button,
        .snow-button {
          min-height: 2.4rem;
          border-radius: 14px;
        }
      }

      @media (pointer: coarse) {
        .stack {
          transition: transform 220ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        .layer span {
          transition:
            transform 220ms cubic-bezier(0.22, 1, 0.36, 1),
            filter 220ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        .theme-button:hover {
          transform: none;
          border-color: rgba(255, 255, 255, 0.2);
        }
      }
    </style>

      <span class="flake" style="--flake-left: 58%; --flake-size: 0.9rem; --flake-duration: 15s; --flake-delay: -11s; --flake-drift: -12px;">❄️</span>

      <span class="flake" style="--flake-left: 78%; --flake-size: 1rem; --flake-duration: 16s; --flake-delay: -14s; --flake-drift: -18px;">❄️</span>
      <span class="flake" style="--flake-left: 88%; --flake-size: 1.35rem; --flake-duration: 18s; --flake-delay: -5s; --flake-drift: 16px;">❄️</span>
      <span class="flake" style="--flake-left: 94%; --flake-size: 0.85rem; --flake-duration: 13s; --flake-delay: -10s; --flake-drift: -10px;">❄️</span>
    </div>
    <div class="controls-panel">
      <details>
        <summary>Customize</summary>
        <div class="controls-body">
          <p class="controls-hint">Swipe inside panel</p>
          <section class="control-section">
            <p class="section-label">Text</p>
            <div class="text-row">
              <input class="text-input" type="text" maxlength="40" placeholder="Write your own" aria-label="Custom text" />
              <button class="action-button apply-text" type="button">Apply</button>
              <button class="action-button copy-link" type="button">Copy</button>
            </div>
          </section>
          <section class="control-section">
            <p class="section-label">Effects</p>
            <div class="toggle-row">
              <button class="toggle-button is-active" type="button" data-toggle="snow">Snow On</button>
              <button class="toggle-button is-active" type="button" data-toggle="parallax">Parallax On</button>
            </div>
          </section>
          <section class="control-section">
            <p class="section-label">Font</p>
            <div class="font-grid" aria-label="Font choices">
              <button class="font-button is-active" type="button" data-font="comic">Comic</button>
              <button class="font-button" type="button" data-font="heavy">Heavy</button>
              <button class="font-button" type="button" data-font="serif">Serif</button>
            </div>
          </section>
          <section class="control-section">
            <p class="section-label">Theme</p>
            <div class="theme-grid" aria-label="Pride color themes">
              <button class="theme-button is-active" type="button" data-theme="rainbow" aria-label="Rainbow theme"></button>
              <button class="theme-button" type="button" data-theme="trans" aria-label="Trans theme"></button>
              <button class="theme-button" type="button" data-theme="lesbian" aria-label="Lesbian theme"></button>
              <button class="theme-button" type="button" data-theme="bi" aria-label="Bi theme"></button>
              <button class="theme-button" type="button" data-theme="pan" aria-label="Pan theme"></button>
              <button class="theme-button" type="button" data-theme="ace" aria-label="Ace theme"></button>
              <button class="theme-button" type="button" data-theme="nonbinary" aria-label="Nonbinary theme"></button>
              <button class="theme-button" type="button" data-theme="genderqueer" aria-label="Genderqueer theme"></button>
              <button class="theme-button" type="button" data-theme="pastel" aria-label="Pastel theme"></button>
              <button class="theme-button" type="button" data-theme="party" aria-label="Party theme"></button>
              <button class="theme-button" type="button" data-theme="chaos" aria-label="Chaos theme"></button>
            </div>
          </section>
          <section class="control-section">
            <p class="section-label">Snow</p>
            <div class="snow-grid" aria-label="Snow emoji choices">
              <button class="snow-button is-active" type="button" data-snow="❄️" aria-label="Snowflake emoji">❄️</button>
              <button class="snow-button" type="button" data-snow="✨" aria-label="Sparkles emoji">✨</button>
              <button class="snow-button" type="button" data-snow="💖" aria-label="Heart emoji">💖</button>
              <button class="snow-button" type="button" data-snow="🫧" aria-label="Bubbles emoji">🫧</button>
              <button class="snow-button" type="button" data-snow="🌈" aria-label="Rainbow emoji">🌈</button>
            </div>
          </section>
        </div>
      </details>
    </div>
    <main class="scene" aria-label="3D rainbow text reading pamukkale.lol">
      <div class="stack">
        <div class="sizer" aria-hidden="true">pamukkale<span class="mobile-break"></span>.lol</div>
        <div class="layer depth-6"><span>pamukkale<span class="mobile-break"></span>.lol</span></div>
        <div class="layer depth-5"><span>pamukkale<span class="mobile-break"></span>.lol</span></div>
        <div class="layer depth-4"><span>pamukkale<span class="mobile-break"></span>.lol</span></div>
        <div class="layer depth-3"><span>pamukkale<span class="mobile-break"></span>.lol</span></div>
        <div class="layer depth-2"><span>pamukkale<span class="mobile-break"></span>.lol</span></div>
        <div class="layer depth-1"><span>pamukkale<span class="mobile-break"></span>.lol</span></div>
        <div class="layer gloss"><span>pamukkale<span class="mobile-break"></span>.lol</span></div>
      </div>
    </main>
    <script>
      const scene = document.querySelector(".scene");
      const stack = document.querySelector(".stack");
      const root = document.documentElement;
      const textInput = document.querySelector(".text-input");
      const applyTextButton = document.querySelector(".apply-text");
      const copyLinkButton = document.querySelector(".copy-link");
      const textNodes = document.querySelectorAll(".sizer, .layer span");
      const themeButtons = document.querySelectorAll(".theme-button");
      const fontButtons = document.querySelectorAll(".font-button");
      const snowButtons = document.querySelectorAll(".snow-button");
      const toggleButtons = document.querySelectorAll(".toggle-button");
      const flakes = document.querySelectorAll(".flake");
      let rafId = 0;
      let pendingX = window.innerWidth / 2;
      let pendingY = window.innerHeight / 2;
      let activePointerId = null;
      let tapCount = 0;
      let tapTimer = 0;
      const themes = {
        rainbow:
          "linear-gradient(100deg, #ff5e7a 0%, #ff9f68 18%, #ffe27a 36%, #7cdd8b 54%, #6cb8ff 74%, #a98bff 100%)",
        trans:
          "linear-gradient(100deg, #78d7ff 0%, #9fe1ff 18%, #f5bcc8 38%, #fff7fb 54%, #f5bcc8 72%, #86d9ff 100%)",
        lesbian:
          "linear-gradient(100deg, #e26d3f 0%, #f2a56f 24%, #fff1df 50%, #d98bc1 74%, #b14b87 100%)",
        bi:
          "linear-gradient(100deg, #eb4b9a 0%, #d94f9b 34%, #8f63b8 56%, #4f78d7 78%, #3d6ed4 100%)",
        pan:
          "linear-gradient(100deg, #ff62b2 0%, #ff67b5 30%, #ffe46b 56%, #7fd7ff 80%, #5db8ff 100%)",
        ace:
          "linear-gradient(100deg, #4b4553 0%, #7b7485 28%, #d9d6df 56%, #f7f5fa 72%, #9b73c8 100%)",
        nonbinary:
          "linear-gradient(100deg, #fff27a 0%, #fff6b0 24%, #fffdf7 50%, #b98ae5 74%, #5c5866 100%)",
        genderqueer:
          "linear-gradient(100deg, #c49be7 0%, #d9bfef 28%, #fffdf8 56%, #8ab567 78%, #5f8d42 100%)",
        pastel:
          "linear-gradient(100deg, #ffb4c8 0%, #ffd2a6 24%, #fff2b0 44%, #b9f2c3 66%, #bad7ff 84%, #d8c1ff 100%)",
        party:
          "linear-gradient(100deg, #ff4f9a 0%, #ff7b52 18%, #ffe14d 36%, #67f1a5 54%, #52c7ff 72%, #9e6fff 100%)",
        chaos:
          "linear-gradient(120deg, #ff3d81 0%, #ff9f1c 20%, #fbff57 40%, #2effb9 60%, #48a6ff 80%, #ca61ff 100%)"
      };
      const storageKey = "pamukkale-theme";
      const fontStorageKey = "pamukkale-font";
      const snowStorageKey = "pamukkale-snow";
      const snowEnabledStorageKey = "pamukkale-snow-enabled";
      const parallaxEnabledStorageKey = "pamukkale-parallax-enabled";
      const defaultText = "pamukkale.lol";
      const fonts = {
        comic: '"Comic Sans MS", "Comic Sans", "Chalkboard SE", "Marker Felt", cursive',
        heavy: '"Arial Black", Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif',
        serif: 'Georgia, "Times New Roman", serif'
      };

      const escapeHtml = (value) =>
        value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");

      const syncUrl = (updates = {}) => {
        const url = new URL(window.location.href);
        Object.entries(updates).forEach(([key, value]) => {
          if (value) {
            url.searchParams.set(key, value);
          } else {
            url.searchParams.delete(key);
          }
        });
        window.history.replaceState({}, "", url.toString());
      };

      const applyTheme = (theme, { persist = true } = {}) => {
        const gradient = themes[theme];
        if (!gradient) return;
        root.style.setProperty("--text-gradient", gradient);
        themeButtons.forEach((item) => item.classList.toggle("is-active", item.dataset.theme === theme));
        if (persist) {
          try {
            window.localStorage.setItem(storageKey, theme);
          } catch {}
          syncUrl({ theme });
        }
      };

      const applyFont = (fontKey, { persist = true } = {}) => {
        const fontValue = fonts[fontKey];
        if (!fontValue) return;
        root.style.setProperty("--display-font", fontValue);
        fontButtons.forEach((item) => item.classList.toggle("is-active", item.dataset.font === fontKey));
        if (persist) {
          try {
            window.localStorage.setItem(fontStorageKey, fontKey);
          } catch {}
          syncUrl({ font: fontKey });
        }
      };

      const applySnow = (emoji, { persist = true } = {}) => {
        if (!emoji) return;
        flakes.forEach((flake) => {
          flake.textContent = emoji;
        });
        snowButtons.forEach((item) => item.classList.toggle("is-active", item.dataset.snow === emoji));
        if (persist) {
          try {
            window.localStorage.setItem(snowStorageKey, emoji);
          } catch {}
          syncUrl({ snow: emoji === "❄️" ? "" : emoji });
        }
      };

      const applySnowEnabled = (enabled, { persist = true } = {}) => {
        const isEnabled = Boolean(enabled);
        root.style.setProperty("--snow-opacity", isEnabled ? "1" : "0");
        const button = document.querySelector('[data-toggle="snow"]');
        if (button) {
          button.classList.toggle("is-active", isEnabled);
          button.textContent = isEnabled ? "Snow On" : "Snow Off";
        }
        if (persist) {
          try {
            window.localStorage.setItem(snowEnabledStorageKey, String(isEnabled));
          } catch {}
          syncUrl({ snowfx: isEnabled ? "" : "off" });
        }
      };

      const applyParallaxEnabled = (enabled, { persist = true } = {}) => {
        const isEnabled = Boolean(enabled);
        const button = document.querySelector('[data-toggle="parallax"]');
        if (button) {
          button.classList.toggle("is-active", isEnabled);
          button.textContent = isEnabled ? "Parallax On" : "Parallax Off";
        }
        if (!isEnabled) {
          activePointerId = null;
          updatePointer(window.innerWidth / 2, window.innerHeight / 2);
        }
        if (persist) {
          try {
            window.localStorage.setItem(parallaxEnabledStorageKey, String(isEnabled));
          } catch {}
          syncUrl({ parallax: isEnabled ? "" : "off" });
        }
      };

      const formatDisplayText = (value) => {
        const escaped = escapeHtml(value);
        const dotIndex = escaped.lastIndexOf(".");
        if (window.innerWidth <= 720 && dotIndex > 0 && dotIndex < escaped.length - 1) {
          return `${escaped.slice(0, dotIndex)}<span class="mobile-break"></span>${escaped.slice(dotIndex)}`;
        }
        if (escaped.length > 10) {
          if (escaped.includes(" ")) {
            const words = escaped.split(/\s+/).filter(Boolean);
            const targetLineLength = window.innerWidth > 720 ? 14 : 12;
            const lines = [];
            let currentLine = "";

            for (const word of words) {
              const candidate = currentLine ? `${currentLine} ${word}` : word;
              if (candidate.length <= targetLineLength || !currentLine) {
                currentLine = candidate;
              } else {
                lines.push(currentLine);
                currentLine = word;
              }
            }

            if (currentLine) {
              lines.push(currentLine);
            }

            if (lines.length > 1) {
              const chunks = [];
              chunks.push(...lines);
              return chunks.join(
                window.innerWidth > 720
                  ? '<br class="forced-break" />'
                  : '<span class="mobile-break"></span>'
              );
            }
          }

          if (window.innerWidth > 720) return escaped;

          const midpoint = Math.ceil(escaped.length / 2);
          const breakChars = ["-", "_", " "];
          let breakIndex = -1;

          for (const char of breakChars) {
            const rightIndex = escaped.indexOf(char, midpoint - 2);
            const leftIndex = escaped.lastIndexOf(char, midpoint + 2);
            breakIndex = rightIndex !== -1 ? rightIndex + 1 : leftIndex !== -1 ? leftIndex + 1 : -1;
            if (breakIndex !== -1) break;
          }

          if (breakIndex === -1) {
            breakIndex = midpoint;
          }

          return `${escaped.slice(0, breakIndex)}<span class="mobile-break"></span>${escaped.slice(breakIndex)}`;
        }
        return escaped;
      };

      const setDisplayText = (value, { persist = true } = {}) => {
        const safeValue = (value || defaultText).trim().slice(0, 40) || defaultText;
        const displayValue = formatDisplayText(safeValue);
        stack.classList.toggle("has-forced-break", displayValue.includes("forced-break"));
        textNodes.forEach((node) => {
          node.innerHTML = displayValue;
        });
        document.title = safeValue;
        textInput.value = safeValue;
        if (persist) {
          syncUrl({ text: safeValue === defaultText ? "" : safeValue });
        }
        fitStackToViewport();
      };

      const triggerEasterEgg = () => {
        root.style.setProperty("--text-gradient", themes.chaos);
        root.style.setProperty("--haze-shift", "-18px");
        root.style.setProperty("--texture-opacity", "0.34");
        window.setTimeout(() => {
          root.style.setProperty("--haze-shift", "0px");
          root.style.setProperty("--texture-opacity", "0.24");
          let rememberedTheme = "rainbow";
          try {
            rememberedTheme = window.localStorage.getItem(storageKey) || "rainbow";
          } catch {}
          applyTheme(rememberedTheme, { persist: false });
        }, 900);
      };

      themeButtons.forEach((button) => {
        const theme = button.dataset.theme;
        const gradient = themes[theme];
        if (gradient) {
          button.style.setProperty("--swatch", gradient);
        }
      });

      fontButtons.forEach((button) => {
        button.addEventListener("click", () => {
          applyFont(button.dataset.font);
          fitStackToViewport();
        });
      });

      snowButtons.forEach((button) => {
        button.addEventListener("click", () => {
          applySnow(button.dataset.snow);
        });
      });

      toggleButtons.forEach((button) => {
        button.addEventListener("click", () => {
          if (button.dataset.toggle === "snow") {
            applySnowEnabled(!button.classList.contains("is-active"));
          }
          if (button.dataset.toggle === "parallax") {
            applyParallaxEnabled(!button.classList.contains("is-active"));
          }
        });
      });

      const updatePointer = (clientX, clientY) => {
        const xRatio = clientX / window.innerWidth;
        const yRatio = clientY / window.innerHeight;
        const x = xRatio * 2 - 1;
        const y = yRatio * 2 - 1;

        root.style.setProperty("--pointer-x", `${(xRatio * 100).toFixed(2)}%`);
        root.style.setProperty("--pointer-y", `${(yRatio * 100).toFixed(2)}%`);
        root.style.setProperty("--bg-shift-x", `${(50 + x * 8).toFixed(2)}%`);
        root.style.setProperty("--bg-shift-y", `${(50 + y * 6).toFixed(2)}%`);
        root.style.setProperty("--rotate-x", `${(-y * 8 - 6).toFixed(2)}deg`);
        root.style.setProperty("--rotate-y", `${(x * 10 + 6).toFixed(2)}deg`);
        root.style.setProperty("--shift-x", `${(x * 10).toFixed(2)}px`);
        root.style.setProperty("--shift-y", `${(y * 8).toFixed(2)}px`);
        root.style.setProperty("--glow-x", `${(x * 12).toFixed(2)}px`);
        root.style.setProperty("--glow-y", `${(y * 10).toFixed(2)}px`);
      };

      const fitStackToViewport = () => {
        const sceneRect = scene.getBoundingClientRect();
        const stackRect = stack.getBoundingClientRect();
        const currentScale = Number.parseFloat(getComputedStyle(root).getPropertyValue("--fit-scale")) || 1;
        const naturalWidth = stackRect.width / currentScale;
        const viewportPadding = window.innerWidth <= 720 ? 14 : 8;
        const availableWidth = Math.max(sceneRect.width - viewportPadding, 1);
        const nextScale = Math.min(1, availableWidth / Math.max(naturalWidth, 1));
        root.style.setProperty("--fit-scale", nextScale.toFixed(4));
      };

      const queuePointerUpdate = (clientX, clientY) => {
        pendingX = clientX;
        pendingY = clientY;
        if (rafId) return;
        rafId = window.requestAnimationFrame(() => {
          updatePointer(pendingX, pendingY);
          rafId = 0;
        });
      };

      window.addEventListener("pointermove", (event) => {
        if (!document.querySelector('[data-toggle="parallax"]')?.classList.contains("is-active")) return;
        if (activePointerId !== null && event.pointerId !== activePointerId) return;
        queuePointerUpdate(event.clientX, event.clientY);
      });

      scene.addEventListener("pointerdown", (event) => {
        if (!document.querySelector('[data-toggle="parallax"]')?.classList.contains("is-active")) return;
        activePointerId = event.pointerId;
        scene.setPointerCapture(event.pointerId);
        queuePointerUpdate(event.clientX, event.clientY);
        tapCount += 1;
        window.clearTimeout(tapTimer);
        if (tapCount >= 5) {
          tapCount = 0;
          triggerEasterEgg();
        } else {
          tapTimer = window.setTimeout(() => {
            tapCount = 0;
          }, 1400);
        }
      });

      scene.addEventListener("pointerup", (event) => {
        if (!document.querySelector('[data-toggle="parallax"]')?.classList.contains("is-active")) return;
        if (activePointerId !== event.pointerId) return;
        activePointerId = null;
        scene.releasePointerCapture(event.pointerId);
        queuePointerUpdate(window.innerWidth / 2, window.innerHeight / 2);
      });

      scene.addEventListener("pointercancel", (event) => {
        if (!document.querySelector('[data-toggle="parallax"]')?.classList.contains("is-active")) return;
        if (activePointerId !== event.pointerId) return;
        activePointerId = null;
        queuePointerUpdate(window.innerWidth / 2, window.innerHeight / 2);
      });

      document.addEventListener("mouseleave", () => {
        if (!document.querySelector('[data-toggle="parallax"]')?.classList.contains("is-active")) return;
        if (activePointerId !== null) return;
        queuePointerUpdate(window.innerWidth / 2, window.innerHeight / 2);
      });

      themeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          applyTheme(button.dataset.theme);
        });
      });

      applyTextButton.addEventListener("click", () => {
        setDisplayText(textInput.value);
      });

      textInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          setDisplayText(textInput.value);
        }
      });

      copyLinkButton.addEventListener("click", async () => {
        const url = new URL(window.location.href);
        url.pathname = "/";
        try {
          await navigator.clipboard.writeText(url.toString());
          copyLinkButton.textContent = "Copied";
        } catch {
          copyLinkButton.textContent = "Nope";
        }
        window.setTimeout(() => {
          copyLinkButton.textContent = "Copy";
        }, 1200);
      });

      let savedTheme = "rainbow";
      try {
        savedTheme = window.localStorage.getItem(storageKey) || "rainbow";
      } catch {}

      let savedFont = "comic";
      try {
        savedFont = window.localStorage.getItem(fontStorageKey) || "comic";
      } catch {}

      let savedSnow = "❄️";
      try {
        savedSnow = window.localStorage.getItem(snowStorageKey) || "❄️";
      } catch {}

      let savedSnowEnabled = true;
      try {
        savedSnowEnabled = (window.localStorage.getItem(snowEnabledStorageKey) || "true") === "true";
      } catch {}

      let savedParallaxEnabled = true;
      try {
        savedParallaxEnabled = (window.localStorage.getItem(parallaxEnabledStorageKey) || "true") === "true";
      } catch {}

      const params = new URLSearchParams(window.location.search);
      const initialTheme = params.get("theme") || savedTheme;
      const initialFont = params.get("font") || savedFont;
      const initialSnow = params.get("snow") || savedSnow;
      const initialSnowEnabled = params.get("snowfx") === "off" ? false : savedSnowEnabled;
      const initialParallaxEnabled = params.get("parallax") === "off" ? false : savedParallaxEnabled;
      const initialText = params.get("text") || defaultText;

      applyTheme(initialTheme, { persist: false });
      applyFont(initialFont, { persist: false });
      applySnow(initialSnow, { persist: false });
      applySnowEnabled(initialSnowEnabled, { persist: false });
      applyParallaxEnabled(initialParallaxEnabled, { persist: false });
      setDisplayText(initialText, { persist: false });
      updatePointer(window.innerWidth / 2, window.innerHeight / 2);
      fitStackToViewport();
      window.addEventListener("resize", () => {
        setDisplayText(new URLSearchParams(window.location.search).get("text") || defaultText, { persist: false });
      });

      if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        let hazeDirection = 1;
        window.setInterval(() => {
          hazeDirection *= -1;
          root.style.setProperty("--haze-shift", `${hazeDirection * 8}px`);
        }, 3200);
      }
    </script>
  </body>
</html>
